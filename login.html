<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./login.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="box">
      <div class="small_box">
        <!-- img -->
        <div class="head_img">
          <img
            src="https://png.pngtree.com/png-clipart/20250428/original/pngtree-cute-boy-giving-a-thumbs-up-cartoon-illustration-png-image_20903240.png"
            alt=""
          />
        </div>

        <!-- email and password -->
        <form action="" class="form">
          <div class="em">
            <i class="bx bxs-envelope"></i>
            <input type="email" required placeholder="Email" />
          </div>

          <div class="em">
            <i class="bx bxs-lock"></i>
            <input type="password" required placeholder="Password" />
          </div>

          <div class="text">
            <div class="text_checkbox">
              <input type="checkbox" />
              <label for="">Remember me</label>
            </div>

            <div class="text_forget">
              <a href="">Forget Password?</a>
            </div>
          </div>
        </form>
      </div>

      <div class="btn">
        <input type="submit" value="Login" />
      </div>
    </div>
  </body>
</html>
